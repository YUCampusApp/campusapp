# Bağımsız H2 test veritabanı (postgres veya dev profili yüklenmez).
# (classpath’te ayrı application.properties olduğunda ana kaynaktaki JWT vb. her ortamda birleşmeyebilir.)
spring.application.name=campusapp
campusapp.jwt.secret=dev-only-change-me-32chars-minimum________
campusapp.jwt.expiration-days=7

spring.datasource.url=jdbc:h2:mem:campusapp_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
