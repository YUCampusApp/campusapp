spring.application.name=campusapp
# Default DB: H2 (in-memory). For Postgres, use the `postgres` profile.
spring.datasource.url=jdbc:h2:mem:campusapp_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Hibernate settings (where SQL is generated)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JWT (native/Capacitor). Override in production.
campusapp.jwt.secret=dev-only-change-me-32chars-minimum________
campusapp.jwt.expiration-days=7

# Giriş / güvenlik teşhisi (terminalde [AUTH LOGIN], [SECURITY 403], [USER DETAILS] satırları)
logging.level.com.yeditepe.campusapp.controller.AuthController=INFO
logging.level.com.yeditepe.campusapp.security.CustomUserDetailsService=INFO
logging.level.com.yeditepe.campusapp.config.LoginRequestLoggingFilter=INFO
logging.level.com.yeditepe.campusapp.config.SecurityProblemHandlers=WARN
logging.level.com.yeditepe.campusapp.exception.AuthExceptionControllerAdvice=WARN
# Daha ayrıntılı: DEBUG yapın veya geçici olarak:
# logging.level.org.springframework.security.web=DEBUG
# logging.level.org.springframework.web.cors=DEBUG